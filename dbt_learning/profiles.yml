dbt_learning:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'dataops') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'dataops_pass_2024') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'ecommerce') }}"
      schema: public
      threads: 4
