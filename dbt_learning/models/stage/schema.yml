version: 2

models:
  - name: stg_customers
    description: Cleaned and standardised customer records from RAW.raw_customers.
    columns:
      - name: customer_id
        description: Unique identifier for each customer.
        tests:
          - unique
          - not_null
      - name: email
        description: Customer email address (should be unique and populated).
        tests:
          - not_null
          - unique

  - name: stg_orders
    description: Cleaned order header records from RAW.raw_orders.
    columns:
      - name: order_id
        description: Unique identifier for each order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to stg_customers.
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_status
        description: Current status of the order.
        tests:
          - accepted_values:
              values: ['pending', 'shipped', 'completed', 'returned', 'cancelled']

  - name: stg_order_items
    description: Individual line items within each order from RAW.raw_order_items.
    columns:
      - name: order_item_id
        description: Unique identifier for each order line item.
        tests:
          - unique
          - not_null
      - name: order_id
        description: Foreign key to stg_orders.
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: product_id
        description: Foreign key to stg_products.
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

  - name: stg_products
    description: Cleaned product catalogue records from RAW.raw_products.
    columns:
      - name: product_id
        description: Unique identifier for each product.
        tests:
          - unique
          - not_null

  - name: stg_store_locations
    description: Cleaned store location records from RAW.raw_store_locations.
    columns:
      - name: store_id
        description: Unique identifier for each store.
        tests:
          - unique
          - not_null
